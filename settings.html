<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoVault | Settings</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<header class="header">

    <div class="logo">
        <i class="fa-brands fa-bitcoin"></i>
        <h1>CryptoVault</h1>
    </div>

</header>

<div class="container">

    <aside class="sidebar">

        <ul>
            <li><a href="index.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>

            <li><a href="market.html"><i class="fa-solid fa-coins"></i> Markets</a></li>

            <li><a href="portfolio.html"><i class="fa-solid fa-wallet"></i> Portfolio</a></li>

            <li><a href="watchlist.html"><i class="fa-solid fa-star"></i> Watchlist</a></li>

            <li><a href="news.html"><i class="fa-solid fa-newspaper"></i> News</a></li>

            <li><a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
        </ul>

    </aside>

    <main class="main-content">

        <h2>Settings</h2>

        <div class="settings-card">

            <h3>Appearance</h3>

            <button id="themeToggle" class="setting-btn">
                <i class="fa-solid fa-moon"></i>
                Toggle Theme
            </button>

        </div>

        <div class="settings-card">

            <h3>Storage</h3>

            <button id="clearDataBtn" class="danger-btn">
                <i class="fa-solid fa-trash"></i>
                Clear All Data
            </button>

        </div>

        <div class="settings-card">

            <h3>Account</h3>

            <button id="logoutBtn" class="logout-btn">
                <i class="fa-solid fa-right-from-bracket"></i>
                Logout
            </button>

        </div>

    </main>

</div>

<script src="settings.js"></script>

</body>
</html>
