<!DOCTYPE html>
<html>
<head>
    <title>CryptoVault Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="container">

    <aside class="sidebar">
        <h2>CryptoVault</h2>

        <ul>
            <li id="dashboardBtn"><i class="fa-solid fa-chart-line"></i> Dashboard</li>
            <li id="marketBtn"><i class="fa-solid fa-coins"></i> Markets</li>
            <li id="portfolioBtn"><i class="fa-solid fa-wallet"></i> Portfolio</li>
            <li id="watchlistBtn"><i class="fa-solid fa-star"></i> Watchlist</li>
            <li id="newsBtn"><i class="fa-solid fa-newspaper"></i> News</li>
            <li id="settingsBtn"><i class="fa-solid fa-gear"></i> Settings</li>
        </ul>
    </aside>

    <main class="main-content">
        <h1>Dashboard</h1>

        <div class="card">
            <h2>Portfolio Value</h2>
            <h3>$15,400</h3>
        </div>

        <div class="card">
            <h2>Total Profit</h2>
            <h3>+12.5%</h3>
        </div>

        <canvas id="priceChart"></canvas>
    </main>

</div>

<script src="js/navigation.js"></script>
</body>
</html>
